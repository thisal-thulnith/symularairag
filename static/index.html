<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Symular AI Chat</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d1117;
    color: #e6edf3;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid #30363d;
    background: #161b22;
  }
  header h1 { margin: 0; font-size: 18px; }
  header small { color: #8b949e; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }

  .msg {
    padding: 12px 16px;
    border-radius: 12px;
    max-width: 80%;
    white-space: pre-wrap;
    line-height: 1.5;
  }
  .user {
    align-self: flex-end;
    background: #1f6feb;
    color: white;
  }
  .bot {
    align-self: flex-start;
    background: #21262d;
    border: 1px solid #30363d;
  }
  .bot a { color: #58a6ff; }
  .meta { font-size: 11px; color: #8b949e; margin-top: 4px; }

  form {
    display: flex;
    gap: 8px;
    padding: 16px 24px;
    border-top: 1px solid #30363d;
    background: #161b22;
  }
  input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
    font-size: 14px;
  }
  input[type="text"]:focus { outline: none; border-color: #1f6feb; }
  button {
    padding: 12px 20px;
    background: #238636;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .typing {
    color: #8b949e;
    font-style: italic;
  }
</style>
</head>
<body>
  <header>
    <h1>Symular AI Assistant</h1>
    <small>Ask about products • say "book a demo" to schedule</small>
  </header>

  <div id="chat"></div>

  <form id="form">
    <input id="input" type="text" placeholder="Ask anything…" autocomplete="off" autofocus />
    <button type="submit" id="send">Send</button>
  </form>

<script>
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const threadId = "web-" + Math.random().toString(36).slice(2, 10);

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function linkify(el) {
  el.innerHTML = el.textContent.replace(
    /(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank">$1</a>'
  );
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const query = input.value.trim();
  if (!query) return;

  addMessage(query, "user");
  input.value = "";
  sendBtn.disabled = true;

  const typing = addMessage("thinking…", "bot typing");

  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, thread_id: threadId }),
    });
    const data = await res.json();
    typing.remove();
    const bot = addMessage(data.answer, "bot");
    linkify(bot);
  } catch (err) {
    typing.remove();
    addMessage("Error: " + err.message, "bot");
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
});
</script>
</body>
</html>
